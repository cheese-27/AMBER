<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A.M.B.E.R</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= PAGE TRANSITION ================= */
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;

  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;

  background-color: #05060a;

  color: rgba(255,255,255,0.88);

  opacity: 0;
  transform: translateY(12px);
  animation: pageIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;

  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at 20% 20%, rgba(80,120,255,0.12), transparent 45%),
    radial-gradient(circle at 80% 0%, rgba(160,80,255,0.10), transparent 50%);

  pointer-events: none;
  z-index: 0;
}

@keyframes pageIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================= PROFESSIONAL SPLASH INTRO ================= */
#splash {
  position: fixed;
  inset: 0;
  z-index: 99999;

  background:
    radial-gradient(circle at center, rgba(120,160,255,0.18), transparent 55%),
    linear-gradient(180deg, rgba(5,8,18,0.98), rgba(2,3,10,1));

  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  animation: splashExit 1s ease forwards;
  animation-delay: 3.2s;
}

.splash-ring {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  position: absolute;

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.03),
    0 0 80px rgba(80,120,255,0.08);

  animation: pulseRing 3s ease infinite;
}

.logo {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 6px;
  opacity: 0;
  transform: translateY(10px);

  animation: logoReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.sub {
  margin-top: 10px;
  font-size: 12px;
  color: rgba(255,255,255,0.58);
  letter-spacing: 1.5px;

  opacity: 0;
  animation: subReveal 1.2s ease forwards;
  animation-delay: 0.5s;
}

.loading-line {
  width: 180px;
  height: 2px;
  margin-top: 24px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
}

.loading-fill {
  width: 0%;
  height: 100%;
  border-radius: 999px;
  background: rgba(255,255,255,0.75);
  animation: loadingBar 2.4s ease forwards;
  animation-delay: 0.6s;
}

@keyframes logoReveal {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes subReveal {
  to {
    opacity: 1;
  }
}

@keyframes loadingBar {
  to {
    width: 100%;
  }
}

@keyframes pulseRing {
  0%,100% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.08);
    opacity: 0.7;
  }
}

@keyframes splashExit {
  to {
    opacity: 0;
    visibility: hidden;
    transform: scale(1.02);
  }
}

/* ================= HEADER ================= */
header {
  text-align: center;
  padding: 18px;
  font-size: 17px;
  font-weight: 600;

  background: rgba(20, 25, 45, 0.22);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ================= CLOCK ================= */
.clock {
  position: fixed;
  top: 14px;
  right: 16px;
  padding: 8px 12px;
  border-radius: 999px;

  background: rgba(25, 30, 50, 0.25);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  font-weight: 500;
  z-index: 100;
}

/* ================= SYSTEM ================= */
.system-box {
  width: 92%;
  margin: 14px auto;
  padding: 12px 16px;

  border-radius: 18px;
  background: rgba(25, 30, 50, 0.20);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.07);
  font-size: 12px;
  color: rgba(255,255,255,0.75);
}

/* ================= APPLE BUTTON HOVER ================= */
button {
  transition:
    transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.35s ease,
    filter 0.35s ease;
}

button:hover {
  transform: translateY(-2px) scale(1.02);
  filter: brightness(1.06);
  box-shadow:
    0 12px 30px rgba(34,197,94,0.18),
    0 0 0 1px rgba(255,255,255,0.05);
}

button:active {
  transform: scale(0.98);
}

/* ================= CARDS ================= */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 18px;
}

.card {
  background: rgba(25, 30, 50, 0.18);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;

  padding: 16px;
  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.35);

  transition:
    transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 0.35s ease,
    border 0.35s ease;
}

.card:hover {
  transform: translateY(-6px);
  border: 1px solid rgba(255,255,255,0.14);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.35),
    0 0 40px rgba(120,160,255,0.06);
}

.card h3 {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}

.value-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.value {
  font-size: 24px;
  font-weight: 600;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: gray;
}

.status {
  font-size: 11px;
  margin-top: 6px;
  color: rgba(255,255,255,0.55);
}

/* ================= CHARTS ================= */
.container {
  width: 92%;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding-bottom: 30px;
}

.chart-box {
  height: 140px;
  background: rgba(25, 30, 50, 0.14);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);

  padding: 10px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

.chart-title {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
}

</style>
</head>

<body>



<header>📡 A.M.B.E.R 📡</header>

<div class="clock" id="clock">PHT --:--:--</div>

<div class="system-box">
  🔌 Serial: <span id="serialStatus">--</span> |
  📶 Signal: <span id="signalStatus">--</span> |
  ⏱ Last Update: <span id="lastUpdate">--</span>s ago
</div>

<div style="width:92%; margin:auto; text-align:right; margin-top:12px;">
  <button onclick="goToPage('/history.html')"
    style="padding:10px 14px;border:none;border-radius:14px;background:rgba(34,197,94,0.85);color:black;font-weight:600;cursor:pointer;">
    📊 View History
  </button>
</div>

<!-- Your existing metrics/cards/charts stay here -->

<!-- ================= METRICS ================= -->
<div class="metrics">

  <div class="card">
    <h3>TEMPERATURE</h3>
    <div class="value-row">
      <span class="dot" id="tempDot"></span>
      <div class="value" id="temp">--</div>
    </div>
    <div class="status" id="tempStatus">STATUS: --</div>
  </div>

  <div class="card">
    <h3>HUMIDITY</h3>
    <div class="value-row">
      <span class="dot" id="humDot"></span>
      <div class="value" id="hum">--</div>
    </div>
    <div class="status" id="humStatus">STATUS: --</div>
  </div>

  <div class="card">
    <h3>AIR QUALITY</h3>
    <div class="value-row">
      <span class="dot" id="ppmDot"></span>
      <div class="value" id="ppm">--</div>
    </div>
    <div class="status" id="ppmStatus">STATUS: --</div>
  </div>

  <div class="card">
    <h3>DUST</h3>
    <div class="value-row">
      <span class="dot" id="dustDot"></span>
      <div class="value" id="dust">--</div>
    </div>
    <div class="status" id="dustStatus">STATUS: --</div>
  </div>

</div>

<!-- ================= CHARTS ================= -->
<div class="container">

  <div>
    <div class="chart-title">TEMPERATURE</div>
    <div class="chart-box"><canvas id="tempChart"></canvas></div>
  </div>

  <div>
    <div class="chart-title">HUMIDITY</div>
    <div class="chart-box"><canvas id="humChart"></canvas></div>
  </div>

  <div>
    <div class="chart-title">AIR QUALITY (PPM)</div>
    <div class="chart-box"><canvas id="ppmChart"></canvas></div>
  </div>

  <div>
    <div class="chart-title">DUST (μg/m³)</div>
    <div class="chart-box"><canvas id="dustChart"></canvas></div>
  </div>

</div>

<script>

/* ================= APPLE PAGE TRANSITION ================= */
function goToPage(url) {
  document.body.style.transition = "all 0.45s cubic-bezier(0.22,1,0.36,1)";
  document.body.style.opacity = "0";
  document.body.style.transform = "translateY(10px)";

  setTimeout(() => {
    window.location.href = url;
  }, 400);
}


/* ===== YOUR ORIGINAL LOGIC (UNCHANGED) ===== */
const socket = io();

const MAX_POINTS = 50;

function limitChart(chart) {
  if (chart.data.labels.length > MAX_POINTS) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
}

/* CLOCK */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    "PHT " + now.toLocaleTimeString("en-PH", {
      hour12: false,
      timeZone: "Asia/Manila"
    });
}
setInterval(updateClock, 1000);
updateClock();

/* AQI */
function tempAQI(t){if(t<=0)return{text:"FREEZING",color:"#1d4ed8"};if(t<=15)return{text:"COLD",color:"#3b82f6"};if(t<=22)return{text:"COOL",color:"#06b6d4"};if(t<=30)return{text:"GOOD",color:"#22c55e"};if(t<=34)return{text:"WARM",color:"#eab308"};if(t<=38)return{text:"HOT",color:"#f97316"};return{text:"EXTREME",color:"#ef4444"};}
function humAQI(h){if(h>=40&&h<=60)return{text:"IDEAL",color:"#22c55e"};return{text:"OK",color:"#eab308"};}
function ppmAQI(p){if(p<=400)return{text:"GOOD",color:"#22c55e"};if(p<=800)return{text:"MODERATE",color:"#eab308"};return{text:"DANGER",color:"#ef4444"};}
function dustAQI(d){if(d<=150)return{text:"GOOD",color:"#22c55e"};if(d<=350)return{text:"MODERATE",color:"#eab308"};if(d<=750)return{text:"UNHEALTHY",color:"#f97316"};return{text:"HAZARDOUS",color:"#ef4444"};}

/* CHARTS (UNCHANGED) */
const baseOptions={animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{grid:{color:"rgba(148,163,184,0.1)"},ticks:{color:"#94a3b8",font:{size:10}}}}};

const tempChart=new Chart(document.getElementById("tempChart"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#ff7a18",pointRadius:1.5}]},options:{...baseOptions,scales:{y:{min:0,max:60}}}});
const humChart=new Chart(document.getElementById("humChart"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#22d3ee",pointRadius:1.5}]},options:{...baseOptions,scales:{y:{min:0,max:100}}}});
const ppmChart=new Chart(document.getElementById("ppmChart"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#a3e635",pointRadius:1.5}]},options:{...baseOptions,scales:{y:{min:0,max:5000}}}});
const dustChart=new Chart(document.getElementById("dustChart"),{type:"line",data:{labels:[],datasets:[{data:[],borderColor:"#f87171",pointRadius:1.5}]},options:{...baseOptions,scales:{y:{min:0,max:1000}}}});

socket.on("air-data",(data)=>{

const t = tempAQI(data.temperature);
const h = humAQI(data.humidity);
const p = ppmAQI(data.ppm);

/* FIX: normalize dust once */
const dustValue = data.dust * 1000; // remove this *1000 if already μg/m³
const d = dustAQI(dustValue);

/* ================= UI ================= */
document.getElementById("temp").innerText = data.temperature + " °C";
document.getElementById("hum").innerText = data.humidity + " %";
document.getElementById("ppm").innerText = data.ppm + " ppm";
document.getElementById("dust").innerText = dustValue.toFixed(1) + " μg/m³";

/* STATUS TEXT */
document.getElementById("tempStatus").innerText = "STATUS: " + t.text;
document.getElementById("humStatus").innerText = "STATUS: " + h.text;
document.getElementById("ppmStatus").innerText = "STATUS: " + p.text;
document.getElementById("dustStatus").innerText = "STATUS: " + d.text;

/* DOT COLORS */
document.getElementById("tempDot").style.background = t.color;
document.getElementById("humDot").style.background = h.color;
document.getElementById("ppmDot").style.background = p.color;
document.getElementById("dustDot").style.background = d.color;

/* ================= CHART ================= */
tempChart.data.labels.push("");
humChart.data.labels.push("");
ppmChart.data.labels.push("");
dustChart.data.labels.push("");

tempChart.data.datasets[0].data.push(data.temperature);
humChart.data.datasets[0].data.push(data.humidity);
ppmChart.data.datasets[0].data.push(data.ppm);

/* FIXED ALIGNMENT */
dustChart.data.datasets[0].data.push(dustValue);

tempChart.update();
humChart.update();
ppmChart.update();
dustChart.update();

});
socket.on("system-status",(data)=>{
document.getElementById("serialStatus").innerText=data.serial;
document.getElementById("signalStatus").innerText=data.signal;
document.getElementById("lastUpdate").innerText=data.lastUpdate;
});


</script>

</body>
</html>
